<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordlistEngine Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        h1 { color: #333; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input[type="text"] { padding: 8px; width: 200px; margin-right: 10px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        #log { max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>WordlistEngine Test</h1>
    
    <div class="section">
        <h3>1. Initialize IndexedDB</h3>
        <button id="btnInit">Initialize DB</button>
        <div id="initResult"></div>
    </div>

    <div class="section">
        <h3>2. Load Wordlist Data</h3>
        <button id="btnLoadSample">Load Sample (10 entries)</button>
        <button id="btnClear">Clear DB</button>
        <div id="loadResult"></div>
    </div>

    <div class="section">
        <h3>3. Test Lookup</h3>
        <input type="text" id="wordInput" placeholder="Enter word (e.g., aaron)">
        <input type="text" id="tagInput" placeholder="Tag (e.g., n-s---mn-)">
        <button id="btnLookup">Lookup</button>
        <div id="lookupResult"></div>
    </div>

    <div class="section">
        <h3>4. Console Log</h3>
        <div id="log"></div>
    </div>

    <script type="module">
        import { WordlistEngine } from './dist/analysis/WordlistEngine.js';

        const engine = new WordlistEngine();
        const logEl = document.getElementById('log');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Sample data matching macrons.txt format
        const sampleData = `a|e--------|a|a_
aaron|n-s---mn-|Aaron|A^a^ro_n
a|r--------|ab|a_
ab|r--------|ab|ab
abs|r--------|ab|abs
aps|r--------|ab|aps
gallia|n-s---fn-|Gallia|G^a^llia
est|v3spia----|sum|est
omnis|a-s---fn-|omnis|omnis
divisa|v-srppfn-|divido|d^i^v^i^sa`;

        document.getElementById('btnInit').addEventListener('click', async () => {
            try {
                log('Initializing IndexedDB...');
                await engine.init();
                const count = engine.size();
                document.getElementById('initResult').innerHTML = 
                    `<div class="result success">DB initialized. Entries: ${count}</div>`;
                log('DB initialized successfully', 'success');
            } catch (err) {
                document.getElementById('initResult').innerHTML = 
                    `<div class="result error">Error: ${err.message}</div>`;
                log(`Error: ${err.message}`, 'error');
            }
        });

        document.getElementById('btnLoadSample').addEventListener('click', async () => {
            try {
                log('Loading sample data...');
                await engine.loadFromText(sampleData, (count) => {
                    if (count % 5 === 0) log(`Loaded ${count} entries...`);
                });
                const count = engine.size();
                document.getElementById('loadResult').innerHTML = 
                    `<div class="result success">Loaded ${count} entries</div>`;
                log(`Sample data loaded: ${count} entries`, 'success');
            } catch (err) {
                document.getElementById('loadResult').innerHTML = 
                    `<div class="result error">Error: ${err.message}</div>`;
                log(`Error: ${err.message}`, 'error');
            }
        });

        document.getElementById('btnClear').addEventListener('click', async () => {
            try {
                log('Clearing DB...');
                await engine.clear();
                document.getElementById('loadResult').innerHTML = 
                    `<div class="result info">Database cleared</div>`;
                log('Database cleared', 'info');
            } catch (err) {
                log(`Error: ${err.message}`, 'error');
            }
        });

        document.getElementById('btnLookup').addEventListener('click', async () => {
            const word = document.getElementById('wordInput').value.trim();
            const tag = document.getElementById('tagInput').value.trim();
            
            if (!word) {
                document.getElementById('lookupResult').innerHTML = 
                    `<div class="result error">Please enter a word</div>`;
                return;
            }

            try {
                log(`Looking up: "${word}" with tag "${tag || 'any'}"`);
                const result = await engine.lookup(word, tag);
                
                if (result) {
                    document.getElementById('lookupResult').innerHTML = 
                        `<div class="result success">Found: "${result}"</div>`;
                    log(`Result: "${result}"`, 'success');
                } else {
                    document.getElementById('lookupResult').innerHTML = 
                        `<div class="result error">Not found</div>`;
                    log('Not found', 'error');
                }
            } catch (err) {
                document.getElementById('lookupResult').innerHTML = 
                    `<div class="result error">Error: ${err.message}</div>`;
                log(`Error: ${err.message}`, 'error');
            }
        });

        // Auto-initialize on load
        window.addEventListener('load', async () => {
            log('Page loaded. Click "Initialize DB" to start.');
        });
    </script>
</body>
</html>
