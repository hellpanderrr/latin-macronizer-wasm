<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Latin Macronizer Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px; }
        textarea { width: 100%; height: 150px; font-family: 'Times New Roman', serif; font-size: 18px; }
        pre { background: #f5f5f5; padding: 15px; overflow-x: auto; font-size: 16px; line-height: 1.6; }
        .result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; }
    </style>
    <script src="public/wasm/rftagger.js?v=7"></script>
</head>
<body>
    <h1>Latin Macronizer - Full Pipeline Test</h1>
    
    <div id="status" class="status loading">Loading WASM module...</div>
    
    <div>
        <h3>Enter Latin Text:</h3>
        <textarea id="input">Gallia est omnis divisa in partes tres</textarea>
        <br><br>
        <button id="processBtn" disabled>Macronize</button>
        <button id="tagOnlyBtn" disabled>Tag Only (no macrons)</button>
    </div>
    
    <div id="result" class="result" style="display: none;">
        <h3>Result:</h3>
        <pre id="output"></pre>
    </div>

    <script type="module">
        // Import the Macronizer components
        import { Macronizer } from './src/core/Macronizer.js';
        import { LemmaEngine } from './src/analysis/LemmaEngine.js';
        import { EndingPatternEngine } from './src/analysis/EndingPatternEngine.js';
        
        let macronizer = null;
        let lemmaEngine = null;
        let endingEngine = null;
        
        async function init() {
            try {
                statusEl.textContent = 'Initializing engines...';
                
                // Initialize LemmaEngine
                lemmaEngine = new LemmaEngine();
                await lemmaEngine.load();
                
                // Initialize EndingPatternEngine
                endingEngine = new EndingPatternEngine();
                await endingEngine.load();
                
                // Initialize Macronizer
                macronizer = new Macronizer({
                    useWasm: true,
                    wasmModelPath: 'latin_macronizer/rftagger-ldt.model'
                });
                await macronizer.initialize();
                
                statusEl.textContent = 'Ready! All engines loaded.';
                statusEl.className = 'status success';
                processBtn.disabled = false;
                tagOnlyBtn.disabled = false;
                
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status error';
                console.error(err);
            }
        }
        
        async function processText(macronize = true) {
            if (!macronizer) {
                outputEl.textContent = 'Macronizer not initialized!';
                return;
            }
            
            const text = inputEl.value.trim();
            if (!text) {
                outputEl.textContent = 'Please enter some text';
                return;
            }
            
            processBtn.disabled = true;
            tagOnlyBtn.disabled = true;
            statusEl.textContent = 'Processing...';
            statusEl.className = 'status loading';
            
            try {
                const result = await macronizer.macronize(text);
                
                let output = '';
                if (macronize) {
                    output += `Macronized: ${result.macronized}\n\n`;
                } else {
                    output += `Original: ${result.original}\n\n`;
                }
                
                output += 'Tokens:\n';
                for (const token of result.taggedTokens) {
                    output += `- ${token.text} [${token.tag}]\n`;
                }
                
                output += `\nConfidence: ${(result.confidence * 100).toFixed(1)}%`;
                output += `\nTime: ${result.processingTime.toFixed(1)}ms`;
                
                outputEl.textContent = output;
                resultDiv.style.display = 'block';
                statusEl.textContent = 'Done!';
                statusEl.className = 'status success';
                
            } catch (err) {
                outputEl.textContent = 'Error: ' + err.message;
                resultDiv.style.display = 'block';
                statusEl.textContent = 'Error during processing';
                statusEl.className = 'status error';
                console.error(err);
            } finally {
                processBtn.disabled = false;
                tagOnlyBtn.disabled = false;
            }
        }
        
        const statusEl = document.getElementById('status');
        const processBtn = document.getElementById('processBtn');
        const tagOnlyBtn = document.getElementById('tagOnlyBtn');
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const resultDiv = document.getElementById('result');
        
        processBtn.addEventListener('click', () => processText(true));
        tagOnlyBtn.addEventListener('click', () => processText(false));
        
        // Initialize
        init();
    </script>
</body>
</html>
