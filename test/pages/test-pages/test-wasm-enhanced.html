<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RFTagger WASM Enhanced Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px; }
        textarea { width: 100%; height: 100px; font-family: monospace; }
        pre { background: #f5f5f5; padding: 15px; overflow-x: auto; }
    </style>
    <script src="public/wasm/rftagger.js?v=6"></script>
</head>
<body>
    <h1>RFTagger WebAssembly Enhanced Test</h1>
    
    <div id="status" class="status loading">Loading WASM module...</div>
    
    <div>
        <h3>Input Text (sentences separated by blank lines, words by spaces):</h3>
        <textarea id="input">Gallia est omnis
Cicero dixit</textarea>
        <br><br>
        <button id="tagBtn" disabled>Tag Words</button>
        <button id="batchTagBtn" disabled>Batch Tag Sentences</button>
        <button id="loadModelBtn" disabled>Load Model</button>
        <button id="compareBtn" disabled>Compare with Native</button>
    </div>
    
    <div>
        <h3>Output:</h3>
        <pre id="output"></pre>
    </div>

    <script>
        let module = null;
        let tagger = null;
        
        const statusEl = document.getElementById('status');
        const tagBtn = document.getElementById('tagBtn');
        const loadModelBtn = document.getElementById('loadModelBtn');
        const outputEl = document.getElementById('output');
        const inputEl = document.getElementById('input');
        
        async function waitForModule(maxWait = 10000) {
            const start = Date.now();
            while (typeof RFTaggerModule === 'undefined' && Date.now() - start < maxWait) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            if (typeof RFTaggerModule === 'undefined') {
                throw new Error('RFTaggerModule not found after ' + maxWait + 'ms');
            }
        }
        
        async function init() {
            try {
                statusEl.textContent = 'Waiting for WASM module...';
                await waitForModule();
                
                module = await RFTaggerModule({
                    locateFile: (path) => {
                        if (path === 'rftagger.wasm') {
                            return 'public/wasm/rftagger.wasm?v=6';
                        }
                        return path;
                    }
                });
                statusEl.textContent = 'WASM module loaded. Ready to load model.';
                statusEl.className = 'status success';
                loadModelBtn.disabled = false;
                
                if (module.FS) {
                    outputEl.textContent = 'FileSystem available. Click "Load Model" to load the Latin model.';
                }
            } catch (err) {
                statusEl.textContent = 'Error loading WASM: ' + err.message;
                statusEl.className = 'status error';
                console.error(err);
            }
        }
        
        loadModelBtn.onclick = async () => {
            try {
                statusEl.textContent = 'Loading model...';
                statusEl.className = 'status loading';
                
                const response = await fetch('latin_macronizer/rftagger-ldt.model?ts=' + Date.now());
                if (!response.ok) {
                    throw new Error('Failed to fetch model: ' + response.status);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                try {
                    module.FS.mkdir('/models');
                } catch (e) {}
                
                module.FS.writeFile('/models/rftagger-ldt.model', uint8Array, { encoding: 'binary' });
                outputEl.textContent = 'Model file written to FS (' + uint8Array.length + ' bytes)';
                
                tagger = new module.RFTagger();
                outputEl.textContent += '\nTagger instance created';
                
                const loaded = tagger.loadModel('/models/rftagger-ldt.model', true, 0.001, false);
                
                if (loaded) {
                    statusEl.textContent = 'Model loaded successfully! Ready to tag.';
                    statusEl.className = 'status success';
                    tagBtn.disabled = false;
                    document.getElementById('batchTagBtn').disabled = false;
                    loadModelBtn.disabled = true;
                    outputEl.textContent = 'Latin model loaded. Tag count: ' + tagger.getTagCount();
                } else {
                    outputEl.textContent += '\nModel.loadModel returned false';
                    throw new Error('Model failed to load (returned false)');
                }
            } catch (err) {
                statusEl.textContent = 'Error loading model: ' + err.message;
                statusEl.className = 'status error';
                console.error(err);
            }
        };
        
        tagBtn.onclick = () => {
            if (!tagger) {
                outputEl.textContent = 'Model not loaded!';
                return;
            }
            
            const words = inputEl.value.trim().split(/\s+/).filter(w => w.length > 0);
            if (words.length === 0) {
                outputEl.textContent = 'No words to tag.';
                return;
            }
            
            const startTotal = performance.now();
            outputEl.textContent = `Processing ${words.length} words...`;
            
            try {
                const tags = tagger.tagTokens(words);
                let result = '';
                for (let i = 0; i < tags.size(); i++) {
                    result += words[i] + ' -> ' + tags.get(i) + '\n';
                }
                const totalTime = (performance.now() - startTotal).toFixed(1);
                result += `\n---\nTotal time: ${totalTime}ms`;
                outputEl.textContent = result;
            } catch (e) {
                outputEl.textContent = 'Error during tagging: ' + e.message;
                console.error(e);
            }
        };
        
        batchTagBtn.onclick = () => {
            if (!tagger) {
                outputEl.textContent = 'Model not loaded!';
                return;
            }
            
            // Split input into sentences (native format: sentences separated by blank lines)
            const rawSentences = inputEl.value.split(/\n\s*\n/);
            const sentences = rawSentences.map(block => block.trim().split(/\s+/).filter(w => w.length > 0)).filter(s => s.length > 0);
            if (sentences.length === 0) {
                outputEl.textContent = 'No sentences to tag.';
                return;
            }
            
            const totalWords = sentences.reduce((sum, s) => sum + s.length, 0);
            outputEl.textContent = `Batch processing: ${sentences.length} sentences, ${totalWords} words...`;
            
            const startTotal = performance.now();
            try {
                const results = tagger.tagSentences(sentences);
                let result = '';
                for (let s = 0; s < results.size(); s++) {
                    const sentTags = results.get(s);
                    const sentWords = sentences[s];
                    for (let i = 0; i < sentTags.size(); i++) {
                        result += sentWords[i] + ' -> ' + sentTags.get(i) + '\n';
                    }
                    result += '\n';
                }
                const totalTime = (performance.now() - startTotal).toFixed(1);
                result += `---\nTotal time: ${totalTime}ms`;
                outputEl.textContent = result;
            } catch (e) {
                outputEl.textContent = 'Error during batch tagging: ' + e.message;
                console.error(e);
            }
        };
        
        // Compare with native output
        const compareBtn = document.getElementById('compareBtn');
        compareBtn.onclick = async () => {
            if (!tagger) {
                outputEl.textContent = 'Model not loaded!';
                return;
            }
            
            outputEl.textContent = 'Loading native baseline and comparing...';
            
            try {
                // Load expected output from caesar-output.txt
                const response = await fetch('caesar-output.txt?ts=' + Date.now());
                const nativeText = await response.text();
                const nativeLines = nativeText.trim().split('\n').filter(l => l.includes('\t'));
                const expected = nativeLines.map(line => {
                    const [word, tag] = line.split('\t');
                    return { word: word.trim(), tag: tag.trim() };
                });
                
                // Tag with WASM
                const words = expected.map(e => e.word);
                const tags = tagger.tagTokens(words);
                
                // Compare
                let matches = 0;
                let mismatches = 0;
                let result = '=== COMPARISON WITH NATIVE ===\n\n';
                
                for (let i = 0; i < expected.length; i++) {
                    const exp = expected[i];
                    const actualTag = tags.get(i);
                    const match = exp.tag === actualTag;
                    
                    if (match) {
                        matches++;
                        result += `✓ ${exp.word}: ${actualTag}\n`;
                    } else {
                        mismatches++;
                        result += `✗ ${exp.word}:\n  Expected: ${exp.tag}\n  Got:      ${actualTag}\n`;
                    }
                }
                
                const accuracy = (matches / (matches + mismatches) * 100).toFixed(1);
                result += `\n=== SUMMARY ===\n`;
                result += `Matches: ${matches}\n`;
                result += `Mismatches: ${mismatches}\n`;
                result += `Accuracy: ${accuracy}%\n`;
                
                outputEl.textContent = result;
                statusEl.textContent = `Comparison complete: ${accuracy}% accuracy`;
                statusEl.className = mismatches === 0 ? 'status success' : 'status error';
                
            } catch (err) {
                outputEl.textContent = 'Error during comparison: ' + err.message;
                console.error(err);
            }
        };
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
