services:
  morpheus-wasm-builder:
    build:
      context: ../..
      dockerfile: native/morpheus/js/Dockerfile.morpheus-wasm
      target: builder
    volumes:
      - ../../public/wasm:/build/output
    command: /bin/true

  morpheus-server:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../../public/wasm:/usr/share/nginx/html/wasm:ro
      - ../html/test-morpheus-wasm.html:/usr/share/nginx/html/test.html:ro
      - ./MorpheusTagger.js:/usr/share/nginx/html/native/morpheus/js/MorpheusTagger.js:ro
