<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFTagger Real Latin Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; border-bottom: 3px solid #4CAF50; padding-bottom: 10px; }
        .status { padding: 10px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .test-case { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .test-case h3 { margin-top: 0; color: #4CAF50; }
        .input { background: #f8f8f8; padding: 10px; border-left: 3px solid #2196F3; margin: 10px 0; font-family: 'Times New Roman', serif; font-size: 16px; }
        .output { background: #f0f0f0; padding: 10px; border-left: 3px solid #4CAF50; margin: 10px 0; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
        .timing { color: #666; font-size: 12px; margin-top: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #45a049; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .summary { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>RFTagger WASM - Real Latin Texts</h1>
    
    <div id="status" class="status loading">Loading WASM module...</div>
    
    <div>
        <button id="initBtn" onclick="init()">Initialize Tagger</button>
        <button id="runAllBtn" onclick="runAllTests()" disabled>Run All Tests</button>
    </div>
    
    <div id="results"></div>
    
    <div id="summary" class="summary" style="display:none;"></div>

    <script src="public/wasm/rftagger.js"></script>
    <script>
        const testCases = [
            {
                name: "Caesar - De Bello Gallico (Opening)",
                text: "Gallia est omnis divisa in partes tres, quarum unam incolunt Belgae, aliam Aquitani, tertiam qui ipsorum lingua Celtae, nostra Galli appellantur.",
                description: "Famous opening of Caesar's Gallic Wars - complex sentence structure"
            },
            {
                name: "Vergil - Aeneid 1.1",
                text: "Arma virumque cano, Troiae qui primus ab oris Italiam, fato profugus, Laviniaque venit litora.",
                description: "Opening of the Aeneid - poetic word order"
            },
            {
                name: "Cicero - Pro Caelio",
                text: "Si quis, iudices, forte nunc adsit ignarus causae, iudicii, temporis, existimet Caelium pro Hispano testimonium denuntiare.",
                description: "Ciceronian prose - subordinate clauses"
            },
            {
                name: "Ovid - Metamorphoses 1.1",
                text: "In nova mutatas dicere formas corpora, di, coeptis nam vos mutastis et illas, adspirate meis primaque ab origine mundus.",
                description: "Ovidian hexameter - frequent enjambment"
            },
            {
                name: "Simple Sentences (Beginner Latin)",
                text: "Puella ambulat in via. Puer videt puellam. Amicus venit ad scholam. Magister docet discipulos.",
                description: "Basic Latin sentences for validation"
            },
            {
                name: "Complex Declension/Conjugation Test",
                text: "Canis magnus currit. Canis magni currunt. Puellae pulchrae rosas dant. Puellae pulchrae rosam dant. Rosae pulchrae sunt. Rosam pulchram video. Rosas pulchras video.",
                description: "Testing declensions across nominative, accusative, dative"
            }
        ];
        
        let module = null;
        let tagger = null;
        
        async function init() {
            const status = document.getElementById('status');
            document.getElementById('initBtn').disabled = true;
            
            try {
                status.textContent = 'Loading WASM...';
                module = await RFTaggerModule();
                
                status.textContent = 'Loading model...';
                const response = await fetch('public/wasm/rftagger-ldt.model');
                const arrayBuffer = await response.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                // Create directory and write model
                try {
                    module.FS.mkdir('/models');
                } catch (e) {
                    // Directory may already exist
                }
                module.FS.writeFile('/models/rftagger-ldt.model', uint8Array, { encoding: 'binary' });
                
                tagger = new module.RFTagger();
                const loaded = tagger.loadModel('/models/rftagger-ldt.model', false, 0.1, false);
                
                if (!loaded) throw new Error('Model failed to load');
                
                // Verify model loaded correctly
                const tagCount = tagger.getTagCount();
                let verifyInfo = 'Model loaded. Tag count: ' + tagCount;
                verifyInfo += '\nSample tags: ';
                for (let i = 0; i < Math.min(10, tagCount); i++) {
                    verifyInfo += tagger.getTagName(i) + ' ';
                }
                
                status.innerHTML = verifyInfo.replace(/\n/g, '<br>');
                status.className = 'status success';
                document.getElementById('runAllBtn').disabled = false;
                
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
                status.className = 'status error';
                console.error(err);
            }
        }
        
        function tokenizeLatin(text) {
            // Simple Latin tokenization: keep punctuation separate
            return text
                .replace(/([.,;:!?])/g, ' $1 ')
                .split(/\s+/)
                .filter(t => t.length > 0);
        }
        
        function runTest(testCase) {
            if (!tagger) return null;
            
            const words = tokenizeLatin(testCase.text);
            const start = performance.now();
            
            // Build vector and tag
            const vec = new module.StringVector();
            words.forEach(w => vec.push_back(w));
            
            const tags = tagger.tagTokens(vec);
            
            let result = '';
            for (let i = 0; i < tags.size(); i++) {
                result += words[i].padEnd(15) + ' -> ' + tags.get(i) + '\n';
            }
            
            const time = (performance.now() - start).toFixed(1);
            const perWord = (time / words.length).toFixed(1);
            
            vec.delete();
            tags.delete();
            
            return {
                output: result,
                time: time,
                perWord: perWord,
                wordCount: words.length
            };
        }
        
        function runAllTests() {
            const resultsDiv = document.getElementById('results');
            const summaryDiv = document.getElementById('summary');
            resultsDiv.innerHTML = '';
            
            let totalTime = 0;
            let totalWords = 0;
            
            testCases.forEach((test, index) => {
                const testDiv = document.createElement('div');
                testDiv.className = 'test-case';
                
                const result = runTest(test);
                totalTime += parseFloat(result.time);
                totalWords += result.wordCount;
                
                testDiv.innerHTML = `
                    <h3>Test ${index + 1}: ${test.name}</h3>
                    <div style="color: #666; font-size: 13px; margin-bottom: 10px;">${test.description}</div>
                    <div class="input"><strong>Input:</strong> ${test.text}</div>
                    <div class="output"><strong>Tags (${result.wordCount} words, ${result.time}ms, ${result.perWord}ms/word):</strong><br>${result.output}</div>
                `;
                
                resultsDiv.appendChild(testDiv);
            });
            
            summaryDiv.style.display = 'block';
            summaryDiv.innerHTML = `
                <h3>Summary</h3>
                <p><strong>Total texts:</strong> ${testCases.length}</p>
                <p><strong>Total words:</strong> ${totalWords}</p>
                <p><strong>Total time:</strong> ${totalTime.toFixed(1)}ms</p>
                <p><strong>Average speed:</strong> ${(totalTime / totalWords).toFixed(2)}ms/word</p>
            `;
        }
        
        // Auto-init
        window.onload = () => {
            if (typeof RFTaggerModule !== 'undefined') {
                init();
            }
        };
    </script>
</body>
</html>
