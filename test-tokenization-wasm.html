<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tokenization + WASM Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px; }
        textarea { width: 100%; height: 100px; font-family: 'Times New Roman', serif; font-size: 18px; }
        pre { background: #f5f5f5; padding: 15px; overflow-x: auto; font-size: 14px; line-height: 1.6; }
    </style>
    <script src="public/wasm/rftagger.js?v=7"></script>
</head>
<body>
    <h1>Tokenization + WASM Integration Test</h1>
    
    <div id="status" class="status loading">Initializing...</div>
    
    <div>
        <h3>Test Text:</h3>
        <textarea id="input">Gallia est omnis divisa in partes tres.</textarea>
        <br><br>
        <button id="tokenizeBtn" disabled>1. Tokenize</button>
        <button id="tagBtn" disabled>2. Tag with WASM</button>
        <button id="fullBtn" disabled>3. Full Pipeline</button>
    </div>
    
    <div id="result" style="display: none;">
        <h3>Result:</h3>
        <pre id="output"></pre>
    </div>

    <script>
        // Import paths (using relative paths for browser)
        // In production, these would be bundled or use import maps
        
        let wasmModule = null;
        let wasmTagger = null;
        
        const statusEl = document.getElementById('status');
        const tokenizeBtn = document.getElementById('tokenizeBtn');
        const tagBtn = document.getElementById('tagBtn');
        const fullBtn = document.getElementById('fullBtn');
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const resultDiv = document.getElementById('result');
        
        // Step 1: Initialize WASM
        async function initWasm() {
            try {
                wasmModule = await RFTaggerModule({
                    locateFile: (path) => {
                        if (path === 'rftagger.wasm') {
                            return 'public/wasm/rftagger.wasm?v=7';
                        }
                        return path;
                    }
                });
                
                await wasmModule.ready;
                
                // Load model
                const response = await fetch('latin_macronizer/rftagger-ldt.model');
                const modelData = await response.arrayBuffer();
                
                try {
                    wasmModule.FS.mkdir('/models');
                } catch (e) {}
                
                wasmModule.FS.writeFile('/models/rftagger-ldt.model', new Uint8Array(modelData));
                
                wasmTagger = new wasmModule.RFTagger();
                const loaded = wasmTagger.loadModel('/models/rftagger-ldt.model', true, 0.001, false);
                
                if (loaded) {
                    statusEl.textContent = `WASM Ready! Tags: ${wasmTagger.getTagCount()}`;
                    statusEl.className = 'status success';
                    tokenizeBtn.disabled = false;
                    tagBtn.disabled = false;
                    fullBtn.disabled = false;
                } else {
                    throw new Error('Failed to load model');
                }
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status error';
                console.error(err);
            }
        }
        
        // Step 2: Simple tokenization (for demo)
        function simpleTokenize(text) {
            // Simple regex-based tokenization
            const words = text.split(/\s+/).filter(w => w.length > 0);
            return words.map((word, i) => ({
                text: word,
                isWord: /^[a-zA-Z]/.test(word),
                index: i
            }));
        }
        
        // Step 3: Tag with WASM
        async function tagWithWasm() {
            const text = inputEl.value.trim();
            const tokens = simpleTokenize(text);
            
            // Get only words for tagging (preserve case - RFTagger is case sensitive)
            const words = tokens.filter(t => t.isWord).map(t => t.text);
            
            if (words.length === 0) {
                outputEl.textContent = 'No words to tag.';
                return;
            }
            
            try {
                // Use tagSentences for context-aware tagging (Viterbi algorithm)
                // Pass as array of sentences: [["Gallia", "est", "omnis"]]
                const sentences = [words];
                const results = wasmTagger.tagSentences(sentences);
                
                let output = 'Tagging Results (with context):\n';
                output += '='.repeat(50) + '\n';
                
                // tagSentences returns vector of vectors
                const sentTags = results.get(0);
                const tagCount = sentTags.size();
                
                let wordIdx = 0;
                for (const token of tokens) {
                    if (token.isWord && wordIdx < tagCount) {
                        const tag = sentTags.get(wordIdx);
                        output += `${token.text.padEnd(15)} -> ${tag}\n`;
                        wordIdx++;
                    } else {
                        output += `${token.text.padEnd(15)} -> [punctuation]\n`;
                    }
                }
                
                outputEl.textContent = output;
                resultDiv.style.display = 'block';
            } catch (err) {
                outputEl.textContent = 'Error: ' + err.message;
                resultDiv.style.display = 'block';
            }
        }
        
        // Event listeners
        tokenizeBtn.addEventListener('click', () => {
            const text = inputEl.value.trim();
            const tokens = simpleTokenize(text);
            let output = 'Tokens:\n' + '='.repeat(30) + '\n';
            tokens.forEach((t, i) => {
                output += `[${i}] ${t.text} ${t.isWord ? '(word)' : '(punct)'}\n`;
            });
            outputEl.textContent = output;
            resultDiv.style.display = 'block';
        });
        
        tagBtn.addEventListener('click', tagWithWasm);
        
        fullBtn.addEventListener('click', async () => {
            await tagWithWasm();
            // This is where full Tokenization + Macronization would go
            // once we have the TypeScript compiled and loaded
        });
        
        // Initialize
        initWasm();
    </script>
</body>
</html>
