<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Full Pipeline Test - Tokenization + Tagging + Lemmatization</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        textarea { width: 100%; height: 100px; font-family: 'Times New Roman', serif; font-size: 18px; }
        pre { background: #f5f5f5; padding: 15px; overflow-x: auto; font-size: 14px; line-height: 1.6; }
        .step { margin: 10px 0; padding: 10px; background: #f9f9f9; border-left: 3px solid #007bff; }
    </style>
    <script src="public/wasm/rftagger.js?v=7"></script>
</head>
<body>
    <h1>Full Pipeline: Tokenization → Tagging → Lemmatization</h1>
    
    <div id="status" class="status loading">Initializing WASM...</div>
    
    <div>
        <h3>Input Text:</h3>
        <textarea id="input">Gallia est omnis divisa in partes tres</textarea>
        <br><br>
        
        <div style="margin: 10px 0; padding: 10px; background: #f0f0f0; border-radius: 5px;">
            <label><strong>Load Wordlist (macrons.txt):</strong></label><br>
            <input type="file" id="wordlistFile" accept=".txt" style="margin: 5px 0;">
            <button id="loadWordlistBtn">Load into IndexedDB</button>
            <div id="wordlistStatus" style="font-size: 12px; color: #666;"></div>
        </div>
        
        <button id="step1Btn" disabled>1. Tokenize</button>
        <button id="step2Btn" disabled>2. Tag (WASM)</button>
        <button id="step3Btn" disabled>3. Add Lemmas</button>
        <button id="step4Btn" disabled>4. Macronize</button>
        <button id="fullBtn" disabled>Run Full Pipeline</button>
    </div>
    
    <div id="results"></div>

    <script type="module">
        import { LemmaEngine } from './dist/analysis/LemmaEngine.js';
        import { EndingPatternEngine } from './dist/analysis/EndingPatternEngine.js';
        import { WordlistEngine } from './dist/analysis/WordlistEngine.js';
        
        let wasmModule = null;
        let wasmTagger = null;
        let lemmaEngine = null;
        let wordlistEngine = null;
        let tokens = [];
        
        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        
        async function init() {
            try {
                wasmModule = await RFTaggerModule({
                    locateFile: (path) => path === 'rftagger.wasm' ? 'public/wasm/rftagger.wasm?v=7' : path
                });
                await wasmModule.ready;
                
                const response = await fetch('latin_macronizer/rftagger-ldt.model');
                const modelData = await response.arrayBuffer();
                
                try { wasmModule.FS.mkdir('/models'); } catch (e) {}
                wasmModule.FS.writeFile('/models/rftagger-ldt.model', new Uint8Array(modelData));
                
                wasmTagger = new wasmModule.RFTagger();
                wasmTagger.loadModel('/models/rftagger-ldt.model', true, 0.001, false);
                
                // Initialize LemmaEngine
                lemmaEngine = new LemmaEngine();
                await lemmaEngine.load();
                
                // Initialize WordlistEngine
                wordlistEngine = new WordlistEngine();
                await wordlistEngine.init();
                
                const hasWordlist = await wordlistEngine.isPopulated();
                if (hasWordlist) {
                    statusEl.textContent = `Ready! WASM + LemmaEngine + Wordlist (${wordlistEngine.size()} entries) loaded.`;
                } else {
                    statusEl.textContent = 'Ready! WASM + LemmaEngine loaded. (Wordlist empty - upload macrons.txt)';
                }
                statusEl.className = 'status success';
                
                document.getElementById('step1Btn').disabled = false;
                document.getElementById('step2Btn').disabled = false;
                document.getElementById('step3Btn').disabled = false;
                document.getElementById('step4Btn').disabled = false;
                document.getElementById('fullBtn').disabled = false;
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status error';
            }
        }
        
        function simpleTokenize(text) {
            return text.split(/\s+/).filter(w => w.length > 0).map((word, i) => ({
                text: word,
                isWord: /^[a-zA-Z]/.test(word),
                isEnclitic: false,
                index: i,
                tag: '---------',
                lemma: null
            }));
        }
        
        function step1_tokenize() {
            const text = document.getElementById('input').value.trim();
            tokens = simpleTokenize(text);
            
            let output = '<div class="step"><h3>Step 1: Tokenization</h3><pre>';
            tokens.forEach((t, i) => {
                output += `[${i}] "${t.text}" ${t.isWord ? '(word)' : '(punct)'}\n`;
            });
            output += '</pre></div>';
            
            resultsEl.innerHTML = output;
        }
        
        function step2_tag() {
            if (tokens.length === 0) {
                alert('Tokenize first!');
                return;
            }
            
            const words = tokens.filter(t => t.isWord).map(t => t.text);
            const sentences = [words];
            const results = wasmTagger.tagSentences(sentences);
            const sentTags = results.get(0);
            
            let wordIdx = 0;
            tokens = tokens.map(t => {
                if (t.isWord && wordIdx < sentTags.size()) {
                    return { ...t, tag: sentTags.get(wordIdx++) };
                }
                return t;
            });
            
            let output = '<div class="step"><h3>Step 2: POS Tagging</h3><pre>';
            tokens.forEach((t, i) => {
                output += `[${i}] "${t.text}" → ${t.tag}\n`;
            });
            output += '</pre></div>';
            
            resultsEl.innerHTML += output;
        }
        
        function step3_lemmatize() {
            if (!lemmaEngine || tokens.length === 0) {
                alert('Tokenize and tag first!');
                return;
            }
            
            tokens = tokens.map(t => {
                if (t.isWord) {
                    const entry = lemmaEngine.lookup(t.text, t.tag);
                    return { ...t, lemma: entry ? entry.lemma : t.text.toLowerCase() };
                }
                return t;
            });
            
            let output = '<div class="step"><h3>Step 3: Lemmatization</h3><pre>';
            tokens.forEach((t, i) => {
                if (t.isWord) {
                    output += `[${i}] "${t.text}" (${t.tag}) → lemma: "${t.lemma}"\n`;
                }
            });
            output += '</pre></div>';
            
            resultsEl.innerHTML += output;
        }
        
        async function step4_macronize() {
            if (tokens.length === 0) {
                alert('Run previous steps first!');
                return;
            }
            
            // Check if wordlist is available
            const hasWordlist = wordlistEngine && await wordlistEngine.isPopulated();
            
            if (hasWordlist) {
                // Use WordlistEngine for accurate macronization
                for (let i = 0; i < tokens.length; i++) {
                    const t = tokens[i];
                    if (t.isWord && t.tag) {
                        const lookupWord = t.lemma || t.text;
                        console.log('Wordlist lookup:', lookupWord, t.tag);
                        const macronized = await wordlistEngine.lookup(lookupWord, t.tag);
                        console.log('Wordlist result:', macronized);
                        
                        if (macronized) {
                            tokens[i] = { ...t, macronizedText: macronized, isMacronized: true };
                        } else {
                            // Fallback to ending patterns
                            tokens[i] = { ...t, macronizedText: t.text, isMacronized: true };
                        }
                    }
                }
                
                let output = '<div class="step"><h3>Step 4: Macronization (Wordlist)</h3><pre>';
                tokens.forEach((t, i) => {
                    if (t.isWord && t.isMacronized) {
                        output += `[${i}] "${t.text}" → "${t.macronizedText}"\n`;
                    }
                });
                output += '</pre></div>';
                resultsEl.innerHTML += output;
            } else {
                // Fallback to EndingPatternEngine
                const endingEngine = new EndingPatternEngine();
                await endingEngine.load();
                
                tokens = tokens.map(t => {
                    if (t.isWord && t.tag) {
                        const lookupWord = t.lemma || t.text;
                        const macronized = endingEngine.macronizeWithPatterns(lookupWord, t.tag);
                        
                        if (macronized) {
                            return { ...t, macronizedText: macronized, isMacronized: true };
                        }
                        return { ...t, macronizedText: t.text, isMacronized: true };
                    }
                    return t;
                });
                
                let output = '<div class="step"><h3>Step 4: Macronization (Pattern Fallback)</h3><pre>';
                tokens.forEach((t, i) => {
                    if (t.isWord && t.isMacronized) {
                        output += `[${i}] "${t.text}" → "${t.macronizedText}"\n`;
                    }
                });
                output += '</pre><p>Note: For accurate results, load macrons.txt into IndexedDB</p></div>';
                resultsEl.innerHTML += output;
            }
        }
        
        async function runFull() {
            resultsEl.innerHTML = '';
            step1_tokenize();
            step2_tag();
            step3_lemmatize();
            step4_macronize();
        }
        
        document.getElementById('step1Btn').addEventListener('click', step1_tokenize);
        document.getElementById('step2Btn').addEventListener('click', step2_tag);
        document.getElementById('step3Btn').addEventListener('click', step3_lemmatize);
        document.getElementById('step4Btn').addEventListener('click', step4_macronize);
        document.getElementById('fullBtn').addEventListener('click', runFull);
        
        // Wordlist file upload handler
        document.getElementById('loadWordlistBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('wordlistFile');
            const statusDiv = document.getElementById('wordlistStatus');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                statusDiv.textContent = 'Please select a file first';
                return;
            }
            
            const file = fileInput.files[0];
            statusDiv.textContent = 'Reading file...';
            
            try {
                const text = await file.text();
                statusDiv.textContent = 'Loading into IndexedDB...';
                
                await wordlistEngine.loadFromText(text, (count) => {
                    statusDiv.textContent = `Loaded ${count} entries...`;
                });
                
                statusDiv.textContent = `Complete! Loaded ${wordlistEngine.size()} entries.`;
                
                // Update main status
                const mainStatus = document.getElementById('status');
                mainStatus.textContent = `Ready! WASM + LemmaEngine + Wordlist (${wordlistEngine.size()} entries) loaded.`;
            } catch (err) {
                statusDiv.textContent = 'Error: ' + err.message;
            }
        });
        
        init();
    </script>
</body>
</html>
