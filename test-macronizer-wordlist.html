<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macronizer + WordlistEngine Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; }
        h1 { color: #333; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        textarea { width: 100%; height: 100px; padding: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 3px; font-family: 'Times New Roman', serif; font-size: 18px; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .info { background: #d1ecf1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
        .token-word { font-family: 'Times New Roman', serif; font-size: 16px; }
        .macronized { color: #0066cc; font-weight: bold; }
        #progress { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Macronizer + WordlistEngine Test</h1>
    
    <div class="section">
        <h3>Input Text</h3>
        <textarea id="inputText">Gallia est omnis divisa in partes tres</textarea>
        <div>
            <button id="btnMacronize">Macronize</button>
            <button id="btnClear">Clear</button>
        </div>
        <div id="progress"></div>
    </div>

    <div class="section">
        <h3>Result</h3>
        <div id="result" class="result">Results will appear here...</div>
    </div>

    <div class="section">
        <h3>Token Details</h3>
        <table id="tokenTable">
            <thead>
                <tr>
                    <th>Original</th>
                    <th>Tag</th>
                    <th>Macronized</th>
                    <th>Method</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="section">
        <h3>Console Log</h3>
        <div id="log" style="max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;"></div>
    </div>

    <script type="module">
        import { Macronizer } from './dist/core/Macronizer.js';

        const macronizer = new Macronizer({
            useWasm: true,
            wasmModelPath: 'latin_macronizer/rftagger-ldt.model',
            wordlistUrl: './public/data/wordlist.txt'
        });

        const progressEl = document.getElementById('progress');
        const resultEl = document.getElementById('result');
        const logEl = document.getElementById('log');
        const tbody = document.querySelector('#tokenTable tbody');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Initialize
        async function init() {
            try {
                progressEl.innerHTML = '<div class="info">Initializing Macronizer (loading WASM + wordlist)...</div>';
                log('Initializing Macronizer...');
                await macronizer.initialize();
                progressEl.innerHTML = '<div class="success">Ready! WASM and wordlist loaded.</div>';
                log('Macronizer initialized successfully', 'success');
            } catch (err) {
                progressEl.innerHTML = `<div class="error">Initialization failed: ${err.message}</div>`;
                log(`Error: ${err.message}`, 'error');
                console.error(err);
            }
        }

        document.getElementById('btnMacronize').addEventListener('click', async () => {
            const text = document.getElementById('inputText').value.trim();
            if (!text) {
                resultEl.innerHTML = '<div class="error">Please enter text</div>';
                return;
            }

            try {
                progressEl.innerHTML = '<div class="info">Processing...</div>';
                log(`Macronizing: "${text}"`);
                
                const result = await macronizer.macronize(text);
                
                // Display result
                resultEl.innerHTML = `<span class="macronized">${result.macronized}</span>`;
                resultEl.className = 'result success';
                
                // Display token details
                tbody.innerHTML = '';
                result.taggedTokens.forEach(token => {
                    const row = document.createElement('tr');
                    const method = token.text !== token.original ? 'wordlist/pattern' : 'unchanged';
                    row.innerHTML = `
                        <td class="token-word">${token.original || token.text}</td>
                        <td><code>${token.tag || '-'}</code></td>
                        <td class="macronized">${token.text}</td>
                        <td>${method}</td>
                    `;
                    tbody.appendChild(row);
                });
                
                log(`Result: "${result.macronized}" (${result.processingTime.toFixed(2)}ms)`, 'success');
                progressEl.innerHTML = `<div class="success">Done! Confidence: ${(result.confidence * 100).toFixed(1)}%</div>`;
            } catch (err) {
                resultEl.innerHTML = `<div class="error">Error: ${err.message}</div>`;
                log(`Error: ${err.message}`, 'error');
                console.error(err);
            }
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            document.getElementById('inputText').value = '';
            resultEl.innerHTML = 'Results will appear here...';
            resultEl.className = 'result';
            tbody.innerHTML = '';
            progressEl.innerHTML = '';
        });

        // Auto-initialize
        init();
    </script>
</body>
</html>
