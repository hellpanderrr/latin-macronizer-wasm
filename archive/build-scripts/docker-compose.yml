version: '3.8'

services:
  # WASM Build Service
  wasm-builder:
    build:
      context: .
      dockerfile: Dockerfile.wasm
      target: builder
    container_name: rftagger-wasm-builder
    volumes:
      - ./build:/build/output
      - ./public/wasm:/build/output:cached
    environment:
      - EMSDK_ENV=/emsdk/emsdk_env.sh
    command: /bin/sh -c "cd /build && ./build-rftagger-wasm.sh"
    networks:
      - macronizer-network

  # Development server with hot reload
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.wasm
      target: development
    container_name: latin-macronizer-dev
    ports:
      - "3000:3000"
      - "9229:9229"  # Node.js debugger
    volumes:
      - .:/app
      - /app/node_modules
      - ./public/wasm:/app/public/wasm:ro
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: npm run dev
    depends_on:
      - wasm-builder
    networks:
      - macronizer-network

  # Production server
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile.wasm
      target: production
    container_name: latin-macronizer-prod
    ports:
      - "8080:3000"
    volumes:
      - ./public/wasm:/app/public/wasm:ro
    environment:
      - NODE_ENV=production
    command: npm start
    depends_on:
      - wasm-builder
    networks:
      - macronizer-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: latin-macronizer-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public/wasm:/usr/share/nginx/html/wasm:ro
    depends_on:
      - app-prod
    networks:
      - macronizer-network

networks:
  macronizer-network:
    driver: bridge

volumes:
  build-output:
  node_modules:
