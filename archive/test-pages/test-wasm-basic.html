<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WASM RFTagger Basic Test</title>
</head>
<body>
    <h1>WASM RFTagger Basic Test</h1>
    <div id="status">Loading WASM...</div>
    <div id="output"></div>
    
    <script src="public/wasm/rftagger.js?v=6"></script>
    <script>
        async function testWASM() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            try {
                // Initialize module
                const Module = await RFTaggerModule({
                    locateFile: (path) => {
                        if (path === 'rftagger.wasm') {
                            return 'public/wasm/rftagger.wasm?v=6';
                        }
                        return path;
                    },
                    print: (text) => { console.log(text); output.innerHTML += '<p>' + text + '</p>'; },
                    printErr: (text) => { console.error(text); output.innerHTML += '<p style="color:red">' + text + '</p>'; }
                });
                
                status.innerHTML = '<p style="color: green;">WASM loaded! Module keys: ' + Object.keys(Module).join(', ') + '</p>';
                
                // Check if FS is available
                if (Module.FS) {
                    output.innerHTML += '<p style="color: green;">FS is available!</p>';
                    
                    // Create test input (full Caesar sentence)
                    const testInput = "Gallia\nest\nomnis\ndivisa\nin\npartes\ntres\n,\nquarum\nunam\nincolunt\nBelgae\n,\naliam\nAquitani\n,\ntertiam\nqui\nipsorum\nlingua\nCeltae\n,\nnostra\nGalli\nappellantur\n.\n";
                    Module.FS.writeFile('/test.txt', testInput);
                    
                    // Fetch and save model
                    output.innerHTML += '<p>Fetching model...</p>';
                    const modelResponse = await fetch('latin_macronizer/rftagger-ldt.model?ts=' + Date.now());
                    const modelData = await modelResponse.arrayBuffer();
                    Module.FS.writeFile('/model.bin', new Uint8Array(modelData));
                    output.innerHTML += '<p>Model saved to /model.bin (' + modelData.byteLength + ' bytes)</p>';
                    
                    // Create RFTagger instance
                    output.innerHTML += '<p>Creating RFTagger...</p>';
                    const tagger = new Module.RFTagger();
                    
                    // Load model
                    output.innerHTML += '<p>Loading model...</p>';
                    const loaded = tagger.loadModel('/model.bin', true, 0.001, false);
                    output.innerHTML += '<p>Model loaded: ' + loaded + '</p>';
                    
                    if (loaded) {
                        output.innerHTML += '<p>Tag count: ' + tagger.getTagCount() + '</p>';
                        
                        // Tag tokens (use the test input)
                        output.innerHTML += '<h3>Tagging test:</h3>';
                        const tokens = testInput.trim().split(/\s+/).filter(w => w.length > 0);
                        const results = tagger.tagTokens(tokens);
                        output.innerHTML += '<pre>' + JSON.stringify(results, null, 2) + '</pre>';
                        
                        // Compare with expected (from caesar-output.txt)
                        output.innerHTML += '<h3>Expected (native):</h3><pre>' +
                            'Gallia: n.-.s.-.-.-.f.b.-\n' +
                            'est: v.3.s.p.i.a.-.-.-\n' +
                            'omnis: a.-.p.-.-.-.f.a.-\n' +
                            'divisa: v.-.s.r.p.p.f.n.-\n' +
                            'in: r.-.-.-.-.-.-.-.-\n' +
                            'partes: n.-.p.-.-.-.f.a.-\n' +
                            'tres: m.-.-.-.-.-.-.-.-\n' +
                            ',: u.-.-.-.-.-.-.-.-\n' +
                            'quarum: p.-.p.-.-.-.f.g.-\n' +
                            'unam: a.-.s.-.-.-.f.a.-\n' +
                            'incolunt: v.3.p.p.i.a.-.-.-\n' +
                            'Belgae: n.-.p.-.-.-.m.n.-\n' +
                            ',: u.-.-.-.-.-.-.-.-\n' +
                            'aliam: n.-.s.-.-.-.f.a.-\n' +
                            'Aquitani: n.-.p.-.-.-.m.n.-\n' +
                            ',: u.-.-.-.-.-.-.-.-\n' +
                            'tertiam: a.-.s.-.-.-.f.a.-\n' +
                            'qui: p.-.s.-.-.-.m.n.-\n' +
                            'ipsorum: p.-.p.-.-.-.m.g.-\n' +
                            'lingua: n.-.s.-.-.-.f.b.-\n' +
                            'Celtae: n.-.p.-.-.-.f.n.-\n' +
                            ',: u.-.-.-.-.-.-.-.-\n' +
                            'nostra: a.-.p.-.-.-.n.n.-\n' +
                            'Galli: n.-.p.-.-.-.m.n.-\n' +
                            'appellantur: v.3.p.p.i.p.-.-.-\n' +
                            '.: u.-.-.-.-.-.-.-.-\n' +
                            '</pre>';
                    }
                } else {
                    output.innerHTML += '<p style="color: red;">FS is NOT available. Available: ' + Object.keys(Module).join(', ') + '</p>';
                }
                
            } catch (err) {
                status.innerHTML = '<p style="color: red;">Error: ' + err.message + '</p>';
                console.error(err);
            }
        }
        
        testWASM();
    </script>
</body>
</html>
