services:
  morpheus-wasm-builder:
    build:
      context: ..
      dockerfile: morpheus_js/Dockerfile.morpheus-wasm
      target: builder
    volumes:
      - ../public/wasm:/build/output
    command: /bin/true

  morpheus-server:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../public/wasm:/usr/share/nginx/html/wasm:ro
      - ./test-morpheus-wasm.html:/usr/share/nginx/html/test.html:ro
      - ./MorpheusTagger.js:/usr/share/nginx/html/morpheus_js/MorpheusTagger.js:ro
