<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RFTagger Comparison Test: WASM vs Expected</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; }
        h1 { color: #333; }
        h2 { color: #555; margin-top: 30px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f5f5f5; font-weight: bold; }
        .match { background: #d4edda; }
        .mismatch { background: #f8d7da; color: #721c24; font-weight: bold; }
        .expected { color: #666; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        pre { background: #f5f5f5; padding: 15px; overflow-x: auto; }
        .summary { font-size: 18px; margin: 20px 0; padding: 15px; border-radius: 5px; }
    </style>
    <script src="public/wasm/rftagger.js"></script>
</head>
<body>
    <h1>RFTagger Test: WASM vs Expected Tags</h1>
    
    <div id="status" class="status loading">Loading WASM module...</div>
    
    <div>
        <button id="loadModelBtn" disabled>Load Latin Model</button>
        <button id="runTestBtn" disabled>Run Test Suite</button>
    </div>
    
    <div id="results"></div>

    <script>
        // Expected results based on original RFTagger output
        const testCases = [
            {
                words: ['Gallia', 'est', 'omnis'],
                expected: [
                    'n.-.s.-.-.-.f.n.-',  // Gallia - noun sing fem nom
                    'v.3.s.p.i.a.-.-.-',  // est - verb 3sg pres ind act
                    'a.-.s.-.-.-.f.n.-'   // omnis - adj sing fem nom
                ]
            },
            {
                words: ['puella', 'videt', 'puerum'],
                expected: [
                    'n.-.s.-.-.-.f.n.-',  // puella - noun sing fem nom
                    'v.3.s.p.i.a.-.-.-',  // videt - verb 3sg pres ind act
                    'n.-.s.-.-.-.m.a.-'   // puerum - noun sing masc acc
                ]
            },
            {
                words: ['mare', 'magnum', 'est'],
                expected: [
                    'n.-.s.-.-.-.n.n.-',  // mare - noun sing neut nom
                    'a.-.s.-.-.-.n.n.-',  // magnum - adj sing neut nom
                    'v.3.s.p.i.a.-.-.-'   // est - verb 3sg pres ind act
                ]
            },
            {
                words: ['romani', 'in', 'italia', 'habitant'],
                expected: [
                    'a.-.p.-.-.-.m.n.-',  // romani - adj pl masc nom (substantivized)
                    'r.-.s.-.-.-.-.-.-',  // in - prep
                    'n.-.s.-.-.-.f.l.-',  // italia - noun sing fem loc (or abl)
                    'v.3.p.p.i.a.-.-.-'   // habitant - verb 3pl pres ind act
                ]
            },
            {
                words: ['canis', 'parvus', 'currit'],
                expected: [
                    'n.-.s.-.-.-.m.n.-',  // canis - noun sing masc nom (or fem)
                    'a.-.s.-.-.-.m.n.-',  // parvus - adj sing masc nom
                    'v.3.s.p.i.a.-.-.-'   // currit - verb 3sg pres ind act
                ]
            }
        ];

        let module = null;
        let tagger = null;
        
        const statusEl = document.getElementById('status');
        const loadModelBtn = document.getElementById('loadModelBtn');
        const runTestBtn = document.getElementById('runTestBtn');
        const resultsEl = document.getElementById('results');
        
        async function init() {
            try {
                while (typeof RFTaggerModule === 'undefined') {
                    await new Promise(r => setTimeout(r, 100));
                }
                module = await RFTaggerModule();
                statusEl.textContent = 'WASM loaded. Ready to load model.';
                statusEl.className = 'status success';
                loadModelBtn.disabled = false;
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status error';
            }
        }
        
        loadModelBtn.onclick = async () => {
            try {
                statusEl.textContent = 'Loading model...';
                statusEl.className = 'status loading';
                
                const response = await fetch('public/wasm/rftagger-ldt.model');
                const uint8Array = new Uint8Array(await response.arrayBuffer());
                
                try { module.FS.mkdir('/models'); } catch (e) {}
                module.FS.writeFile('/models/rftagger-ldt.model', uint8Array, { encoding: 'binary' });
                
                tagger = new module.RFTagger();
                const loaded = tagger.loadModel('/models/rftagger-ldt.model', true, 0.001, false);
                
                if (loaded) {
                    statusEl.textContent = 'Latin model loaded! Ready to test.';
                    statusEl.className = 'status success';
                    runTestBtn.disabled = false;
                    loadModelBtn.disabled = true;
                } else {
                    throw new Error('Model load failed');
                }
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status error';
            }
        };
        
        runTestBtn.onclick = () => {
            let html = '<h2>Test Results</h2>';
            let totalTests = 0;
            let passedTests = 0;
            
            testCases.forEach((testCase, idx) => {
                html += `<h3>Test ${idx + 1}: "${testCase.words.join(' ')}"</h3>`;
                html += '<table><tr><th>Word</th><th>WASM Result</th><th>Expected</th><th>Status</th></tr>';
                
                // Tag with WASM
                const vec = new module.StringVector();
                testCase.words.forEach(w => vec.push_back(w));
                const tags = tagger.tagTokens(vec);
                
                for (let i = 0; i < testCase.words.length; i++) {
                    const wasmTag = tags.get(i);
                    const expectedTag = testCase.expected[i];
                    const match = wasmTag === expectedTag;
                    
                    totalTests++;
                    if (match) passedTests++;
                    
                    const statusClass = match ? 'match' : 'mismatch';
                    const statusText = match ? '✓ MATCH' : '✗ MISMATCH';
                    
                    html += `<tr class="${statusClass}">`;
                    html += `<td><strong>${testCase.words[i]}</strong></td>`;
                    html += `<td>${wasmTag}</td>`;
                    html += `<td class="expected">${expectedTag}</td>`;
                    html += `<td>${statusText}</td>`;
                    html += '</tr>';
                }
                
                vec.delete();
                html += '</table>';
            });
            
            // Summary
            const passRate = ((passedTests / totalTests) * 100).toFixed(1);
            const summaryClass = passRate >= 90 ? 'success' : (passRate >= 70 ? 'loading' : 'error');
            
            html += `<div class="summary status ${summaryClass}">`;
            html += `<strong>Summary:</strong> ${passedTests}/${totalTests} tests passed (${passRate}%)`;
            html += '</div>';
            
            // Memory info
            const wasmMemory = module.HEAPU8.length;
            html += `<pre>WASM Memory: ${(wasmMemory / 1024 / 1024).toFixed(1)} MB`;
            if (performance.memory) {
                html += `\nJS Heap: ${(performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(1)} MB`;
            }
            html += '</pre>';
            
            resultsEl.innerHTML = html;
        };
        
        init();
    </script>
</body>
</html>
